name: Discover and Prepare Applications

on:
  workflow_dispatch:
    inputs:
      min_score:
        description: "Minimum fit score for pack generation"
        required: false
        default: "70"
      limit:
        description: "Maximum discovered leads"
        required: false
        default: "25"
  schedule:
    # Weekly Monday 03:30 UTC. Adjust or disable depending on your usage.
    - cron: "30 3 * * 1"

jobs:
  discover-and-prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Discover jobs
        run: |
          portfoliofit discover-jobs \
            --config config/job_sources.example.yaml \
            --output outputs/job_discovery/latest \
            --limit "${{ github.event.inputs.limit || '25' }}"

      - name: Generate packs from discovered jobs
        run: |
          portfoliofit generate-packs-from-discovery \
            outputs/job_discovery/latest/jobs.json \
            --profile profile/master_profile.yaml \
            --portfolio profile/project_portfolio.yaml \
            --rules profile/resume_rules.yaml \
            --output outputs/applications/discovered_jobs \
            --min-score "${{ github.event.inputs.min_score || '70' }}"

      - name: Upload discovery outputs
        uses: actions/upload-artifact@v4
        with:
          name: discovered-job-leads-and-application-packs
          path: |
            outputs/job_discovery/latest/**
            outputs/applications/discovered_jobs/**
            outputs/applications/application_tracker.csv
          if-no-files-found: error
