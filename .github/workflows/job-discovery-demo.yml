name: Job Discovery Demo

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "app/core/job_discovery.py"
      - "app/cli/main.py"
      - "config/job_sources.example.yaml"
      - "data/sample_jobs/job_discovery_sample.html"
      - ".github/workflows/job-discovery-demo.yml"
      - "profile/master_profile.yaml"
      - "profile/project_portfolio.yaml"
      - "profile/resume_rules.yaml"

jobs:
  discovery-demo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Discover jobs from configured sources
        run: |
          portfoliofit discover-jobs \
            --config config/job_sources.example.yaml \
            --output outputs/job_discovery/latest \
            --limit 25

      - name: Generate packs from discovered jobs
        run: |
          portfoliofit generate-packs-from-discovery \
            outputs/job_discovery/latest/jobs.json \
            --profile profile/master_profile.yaml \
            --portfolio profile/project_portfolio.yaml \
            --rules profile/resume_rules.yaml \
            --output outputs/applications/discovered_jobs \
            --min-score 60

      - name: Show discovery report
        run: |
          echo "==== Discovery report ===="
          cat outputs/job_discovery/latest/discovery_report.md
          echo "==== Tracker summary ===="
          portfoliofit tracker-summary --tracker outputs/applications/discovered_jobs/application_tracker.csv || true

      - name: Upload discovery and generated packs
        uses: actions/upload-artifact@v4
        with:
          name: job-discovery-demo-output
          path: |
            outputs/job_discovery/latest/**
            outputs/applications/discovered_jobs/**
          if-no-files-found: error
