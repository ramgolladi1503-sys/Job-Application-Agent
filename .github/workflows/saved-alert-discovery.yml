name: Saved Alert Discovery

on:
  workflow_dispatch:
    inputs:
      min_score:
        description: "Minimum fit score for pack generation"
        required: false
        default: "70"
      limit:
        description: "Maximum discovered leads"
        required: false
        default: "25"

jobs:
  saved-alert-discovery:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Discover jobs from saved alerts
        run: |
          portfoliofit discover-jobs \
            --config config/job_sources.saved_alerts.yaml \
            --output outputs/job_discovery/saved_alerts \
            --limit "${{ github.event.inputs.limit || '25' }}"

      - name: Generate packs from saved-alert jobs
        run: |
          portfoliofit generate-packs-from-discovery \
            outputs/job_discovery/saved_alerts/jobs.json \
            --profile profile/master_profile.yaml \
            --portfolio profile/project_portfolio.yaml \
            --rules profile/resume_rules.yaml \
            --output outputs/applications/saved_alert_jobs \
            --min-score "${{ github.event.inputs.min_score || '70' }}"

      - name: Upload saved-alert outputs
        uses: actions/upload-artifact@v4
        with:
          name: saved-alert-job-leads-and-application-packs
          path: |
            outputs/job_discovery/saved_alerts/**
            outputs/applications/saved_alert_jobs/**
            outputs/applications/application_tracker.csv
          if-no-files-found: error
