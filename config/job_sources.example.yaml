# PortfolioFit job discovery sources.
# Keep this compliant: use public/search URLs, exported job-alert files, RSS feeds, or your own saved HTML.
# Do not use this tool to bypass logins, captchas, robots restrictions, or platform anti-abuse systems.

sources:
  - name: sample_local_jobs
    type: file
    enabled: true
    path: data/sample_jobs/job_discovery_sample.html

  # Best source type: company career pages. These are usually more stable and less hostile to automation than job-board pages.
  # Enable only the ones you want. Some sites render jobs client-side, so discovery may find fewer leads unless you use saved HTML exports.

  - name: microsoft_careers_qa
    type: search_url
    enabled: false
    url: "https://jobs.careers.microsoft.com/global/en/search?q=QA%20Automation"

  - name: microsoft_careers_ai_testing
    type: search_url
    enabled: false
    url: "https://jobs.careers.microsoft.com/global/en/search?q=AI%20Testing"

  - name: google_careers_test_engineer
    type: search_url
    enabled: false
    url: "https://www.google.com/about/careers/applications/jobs/results/?q=Test%20Engineer"

  - name: amazon_jobs_qa_sdet
    type: search_url
    enabled: false
    url: "https://www.amazon.jobs/en/search?base_query=QA%20SDET"

  - name: ibm_careers_qa_automation
    type: search_url
    enabled: false
    url: "https://www.ibm.com/careers/search?q=QA%20Automation"

  - name: accenture_careers_testing
    type: search_url
    enabled: false
    url: "https://www.accenture.com/in-en/careers/jobsearch?jk=testing"

  - name: deloitte_careers_qa
    type: search_url
    enabled: false
    url: "https://jobsindia.deloitte.com/search/?q=QA"

  - name: epam_careers_qa_automation
    type: search_url
    enabled: false
    url: "https://www.epam.com/careers/job-listings?query=QA%20Automation"

  - name: thoughtworks_careers_qa
    type: search_url
    enabled: false
    url: "https://www.thoughtworks.com/careers/jobs?query=QA"

  - name: public_company_careers_placeholder
    type: search_url
    enabled: false
    url: "https://example.com/careers"

  # Job-board placeholders. Use cautiously. Prefer saved/exported pages or email alerts instead of live scraping.

  - name: linkedin_saved_search_placeholder
    type: search_url
    enabled: false
    url: "https://www.linkedin.com/jobs/search/?keywords=GenAI%20QA%20Engineer&location=India"

  - name: naukri_saved_search_placeholder
    type: search_url
    enabled: false
    url: "https://www.naukri.com/genai-qa-engineer-jobs"

  - name: indeed_saved_search_placeholder
    type: search_url
    enabled: false
    url: "https://www.indeed.com/jobs?q=GenAI+QA+Engineer"

  # Recommended for LinkedIn/Naukri/Indeed/Monster: save/export job-alert emails or pages locally, then point to them here.

  - name: saved_job_alerts_placeholder
    type: file
    enabled: false
    path: data/job_alert_exports/saved_job_alert.html
