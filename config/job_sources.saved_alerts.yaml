# Saved job-alert/job-page/email sources for PortfolioFit discovery.
# Preferred fully automated path: job-site alerts -> email inbox -> IMAP source below.
# Fallback path: put exported LinkedIn/Naukri/Indeed/Monster/job-page HTML/TXT/EML files under data/job_alert_exports/.

sources:
  # Automated email alert ingestion. Enable after setting repository secrets:
  # JOB_ALERT_EMAIL_USERNAME and JOB_ALERT_EMAIL_PASSWORD.
  # For Gmail, use an app password, not your normal account password.
  - name: gmail_job_alerts_inbox
    type: imap
    enabled: false
    host: imap.gmail.com
    mailbox: INBOX
    username_env: JOB_ALERT_EMAIL_USERNAME
    password_env: JOB_ALERT_EMAIL_PASSWORD
    search: '(OR FROM "jobalerts-noreply@linkedin.com" OR FROM "noreply@naukri.com" OR FROM "alert@indeed.com")'
    max_messages: 30

  - name: all_saved_job_alert_html_exports
    type: glob
    enabled: true
    pattern: data/job_alert_exports/*.html

  - name: all_saved_job_alert_text_exports
    type: glob
    enabled: true
    pattern: data/job_alert_exports/*.txt

  - name: all_saved_job_alert_eml_exports
    type: glob
    enabled: true
    pattern: data/job_alert_exports/*.eml

  # Optional explicit sources. Enable these if you want named source tracking per platform.

  - name: linkedin_genai_qa_alert_export
    type: file
    enabled: false
    path: data/job_alert_exports/linkedin_genai_qa_alert.html

  - name: linkedin_sdet_alert_export
    type: file
    enabled: false
    path: data/job_alert_exports/linkedin_sdet_alert.html

  - name: naukri_qa_automation_alert_export
    type: file
    enabled: false
    path: data/job_alert_exports/naukri_qa_automation_alert.html

  - name: naukri_dotnet_react_qa_alert_export
    type: file
    enabled: false
    path: data/job_alert_exports/naukri_dotnet_react_qa_alert.html

  - name: indeed_ai_testing_alert_export
    type: file
    enabled: false
    path: data/job_alert_exports/indeed_ai_testing_alert.html

  - name: monster_qa_alert_export
    type: file
    enabled: false
    path: data/job_alert_exports/monster_qa_alert.html

  - name: company_careers_saved_export
    type: file
    enabled: false
    path: data/job_alert_exports/company_careers_saved_export.html
