<!doctype html>
<html>
  <head><title>Sample Job Discovery Page</title></head>
  <body>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org/",
      "@type": "JobPosting",
      "title": "GenAI QA Engineer",
      "description": "We need a QA engineer for LLM Evaluation, Prompt Testing, Model Validation, Hallucination Testing, AI Testing, API Testing, Python automation, and policy controls.",
      "hiringOrganization": {"@type": "Organization", "name": "Example AI Labs"},
      "jobLocation": {"@type": "Place", "address": {"addressLocality": "Remote", "addressCountry": "India"}},
      "url": "https://example.com/jobs/genai-qa-engineer"
    }
    </script>

    <section>
      <h2>QA Engineer - .NET + React</h2>
      <p>Company: Example FinTech Solutions</p>
      <p>Location: Hyderabad / Hybrid</p>
      <p>Must have Selenium, API Testing, Regression Testing, .NET Core exposure, React exposure, Docker, GitHub Actions, CI/CD validation, and financial workflow testing.</p>
      <p>https://example.com/jobs/dotnet-react-qa</p>
    </section>
  </body>
</html>
